<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Task</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Select a Task</h2>
    <button onclick="chooseTask(1)">Task 1</button>
    <button onclick="chooseTask(2)">Task 2</button>
    <button onclick="chooseTask(3)">Task 3</button>
   

    <script>
        function chooseTask(taskNumber) {
            const tasks = {

                1: {
                    accountInfo: {
                        name: "Millers Jean and Apparel",
                        ownerName: "Paul Miller",
                        businessNumber: "341278350 RT0001",
                        accountType: "gst",
                        address:  "300 Christine Ave<br>Ottawa ON K2G 1B8<br>Canada"
                    },
                    userLevel: 3,
                    racUserName: "Paul Miller"
                },
                2: {
                    accountInfo: {
                        name: "Bill's Gravel and Fill",
                        ownerName: "Bill Wilson",
                        businessNumber: "335789123 RT0001",
                        accountType: "gst",
                        address: "102 Frank St<br>Ottawa, ON K2G 1B8<br>Canada"
                    },
                    userLevel: 2,
                    racUserName: "John Smith"
                },
                3: {
                    accountInfo: {
                        name: "Maria's Home Bakery",
                        ownerName: "Maria Carlucci",
                        businessNumber: "635789123 RT0001",
                        accountType: "gst",
                        address:  "75 Preston St<br>Ottawa ON K2G 1B8<br>Canada"
                    },
                    userLevel: 3,
                    racUserName: "Jacob Wallace"
                }
            };

            // Store the selected task's data in sessionStorage
            sessionStorage.setItem("selectedTask", JSON.stringify(tasks[taskNumber]));
            sessionStorage.setItem("taskNum", taskNumber);

            // Redirect to main index page
            if(taskNumber < 4) {
                window.location.href = "index.html";

            }
            
        }
    </script>
</body>
</html>
